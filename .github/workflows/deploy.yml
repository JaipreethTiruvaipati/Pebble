name: Deploy to Amazon ECS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: pebble-backend
  ECS_CLUSTER: pebble-cluster
  API_SERVICE: api-gateway
  PENALTY_SERVICE: penalty-service

jobs:
  deploy:
    name: Build & Deploy to ECS
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    # Note: In a real environment, you would download the task definition,
    # render the new image ID into it, and deploy it to ECS here.
    # We are stubbing the final deployment step as it requires active AWS infrastructure.
    - name: Deploy Amazon ECS task definition (Stub)
      run: |
        echo "Successfully built and pushed image. Ready to deploy to $ECS_CLUSTER -> $API_SERVICE and $PENALTY_SERVICE"
