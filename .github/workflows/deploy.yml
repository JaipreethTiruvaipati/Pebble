name: Deploy to Amazon ECS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY_ALIAS: pebble
  ECS_CLUSTER: pebble-cluster

jobs:
  build-and-push:
    name: Build & Push All Service Images
    runs-on: ubuntu-latest
    environment: production
    strategy:
      matrix:
        service:
          - api-gateway
          - bill-service
          - scoring-service
          - penalty-service
          - investment-service
          - market-poller
          - notification-service

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push ${{ matrix.service }}
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build \
          --build-arg SERVICE=${{ matrix.service }} \
          -t $ECR_REGISTRY/pebble-${{ matrix.service }}:$IMAGE_TAG \
          -t $ECR_REGISTRY/pebble-${{ matrix.service }}:latest \
          -f backend/Dockerfile .
        docker push $ECR_REGISTRY/pebble-${{ matrix.service }}:$IMAGE_TAG
        docker push $ECR_REGISTRY/pebble-${{ matrix.service }}:latest

  deploy:
    name: Deploy Services to ECS
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Force new deployment on all ECS services
      run: |
        SERVICES=(
          api-gateway
          bill-service
          scoring-service
          penalty-service
          investment-service
          market-poller
          notification-service
        )
        for svc in "${SERVICES[@]}"; do
          echo "🚀 Deploying $svc..."
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service "$svc" \
            --force-new-deployment \
            --no-cli-pager || echo "⚠️  $svc not found in ECS — skipping"
        done
