name: Security Scan

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/security-scan.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Download modules
        run: go mod download

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  trivy-images:
    runs-on: ubuntu-latest
    needs: govulncheck
    strategy:
      matrix:
        service:
          - api-gateway
          - bill-service
          - scoring-service
          - penalty-service
          - investment-service
          - market-poller
          - notification-service
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build --build-arg SERVICE=${{ matrix.service }} -t pebble-${{ matrix.service }}:ci -f backend/Dockerfile .

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: pebble-${{ matrix.service }}:ci
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
