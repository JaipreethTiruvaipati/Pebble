openapi: 3.0.3
info:
  title: Pebble API
  description: API definitions for the Pebble project, shared between Go backend and React frontend.
  version: 0.1.0
servers:
  - url: http://localhost:8080/api/v1
    description: Local Dev Server

paths:
  /auth/login:
    post:
      summary: Login via email/password
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /transactions/{id}/confirm:
    post:
      summary: Confirm a scored transaction to queue penalties
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Penalties confirmed

  /line-items/{id}/score:
    put:
      summary: Override the AI impulse score for a line item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                override_score:
                  type: integer

  /penalties:
    get:
      summary: List all pending penalties
      responses:
        '200':
          description: A list of penalties
  /penalties/{id}/contest:
    post:
      summary: Contest an AI score
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Status updated to contested
  /penalties/{id}/confirm:
    post:
      summary: Confirm a penalty early
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Status updated to confirmed

  /wallet/balance:
    get:
      summary: Get user wallet balance and pending penalties
      responses:
        '200':
          description: Wallet balance info
  /wallet/topup:
    post:
      summary: Add money to wallet via Razorpay
      responses:
        '200':
          description: Topup initiated
  /wallet/ledger:
    get:
      summary: Get wallet transaction history
      responses:
        '200':
          description: List of wallet transactions

components:
  schemas:
    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user_id:
          type: string
